services:
  - type: web
    name: teamflow-backend
    runtime: node
    plan: free
    rootDir: team-flow-2/backend
    buildCommand: npm install
startCommand: npx tsx src/index.ts
    envVars:
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: DATABASE_URL
        value: file:./prisma/teamflow.db
      - key: FRONTEND_URL
        sync: false
      - key: PORT
        value: 4000
